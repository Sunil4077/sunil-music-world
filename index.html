<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunil Music World</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
    scroll-behavior:smooth;
}

body{
    background:url('bg.png') no-repeat center center/cover;
    background-attachment:fixed;
    color:white;
}

/* NAVBAR */

nav{
    width:100%;
    padding:20px 40px;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:fixed;
    top:0;
    z-index:1000;
}

.logo{
    color:#ffcc00;
    font-size:32px;
    font-weight:bold;
    text-shadow:0 0 10px red;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-size:18px;
}

nav ul li a:hover{
    color:#ff4d4d;
}

/* HERO */

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:rgba(0,0,0,0.5);
}

.hero h1{
    font-size:70px;
    color:#ffcc00;
    text-shadow:0 0 20px red;
}

.hero p{
    margin-top:20px;
    font-size:24px;
}

.hero button{
    margin-top:30px;
    padding:15px 40px;
    border:none;
    border-radius:30px;
    background:#ff3333;
    color:white;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 0 20px red;
}

/* SONGS */

.songs{
    padding:100px 20px;
    text-align:center;
    background:rgba(0,0,0,0.6);
}

.songs h2{
    font-size:50px;
    margin-bottom:40px;
    color:#66ffff;
}

.song-box{
    width:400px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    box-shadow:0 0 20px red;
}

.song-box h3{
    margin-bottom:20px;
    color:#ffd369;
    font-size:28px;
}

/* GALLERY */

.gallery{
    padding:100px 20px;
    text-align:center;
}

.gallery h2{
    font-size:50px;
    color:#66ffff;
    margin-bottom:40px;
}

.gallery-images{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.gallery-images img{
    width:300px;
    border-radius:20px;
    box-shadow:0 0 20px red;
}

/* VIDEO */

.video{
    padding:100px 20px;
    text-align:center;
    background:rgba(0,0,0,0.6);
}

.video h2{
    font-size:50px;
    color:#66ffff;
    margin-bottom:40px;
}

/* CONTACT */

.contact{
    padding:100px 20px;
    text-align:center;
}

.contact h2{
    font-size:50px;
    color:#66ffff;
    margin-bottom:30px;
}

.contact input,
.contact textarea{
    width:350px;
    padding:15px;
    margin:10px;
    border:none;
    border-radius:10px;
}

.contact button{
    padding:15px 40px;
    border:none;
    border-radius:30px;
    background:#ff3333;
    color:white;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 20px red;
}

/* FOOTER */

footer{
    text-align:center;
    padding:30px;
    background:rgba(0,0,0,0.7);
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
    font-size:40px;
}

.song-box{
    width:90%;
}

.gallery-images img{
    width:90%;
}

iframe{
    width:100%;
    height:250px;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="logo">Sunil Music World</div>

<ul>
<li><a href="#home">Home</a></li>
<li><a href="#songs">Songs</a></li>
<li><a href="#gallery">Gallery</a></li>
<li><a href="#video">Video</a></li>
<li><a href="#contact">Contact</a></li>
</ul>

</nav>

<!-- HERO -->

<section class="hero" id="home">

<h1>🎵 Sunil Music World 🎵</h1>

<p>Welcome to my professional music website</p>

<button>Click Me</button>

</section>

<!-- SONGS -->

<section class="songs" id="songs">

<h2>🎵 My Songs 🎵</h2>

<div class="song-box">

<h3>PREMA YESUNI</h3>

<audio controls style="width:100%;">

<source src="PREMA YESUNI.mp3" type="audio/mpeg">

Your browser does not support audio.

</audio>

</div>

</section>

<!-- GALLERY -->

<section class="gallery" id="gallery">

<h2>Gallery</h2>

<div class="gallery-images">

<img src="bg.png">
<img src="bg.png">
<img src="bg.png">

</div>

</section>

<!-- VIDEO -->

<section class="video" id="video">

<h2>Latest Video</h2>

<iframe width="800" height="450"
src="https://www.youtube.com/embed/m5OQzJFDdm8"
title="YouTube video player"
frameborder="0"
allowfullscreen>
</iframe>

</section>

<!-- CONTACT -->

<section class="contact" id="contact">

<h2>Contact Me</h2>

<input type="text" placeholder="Your Name"><br>

<input type="email" placeholder="Your Email"><br>

<textarea rows="5" placeholder="Your Message"></textarea><br>

<button>Send</button>

</section>

<!-- FOOTER -->

<footer>

© 2026 Sunil Music World | All Rights Reserved

</footer>

</body>
</html>
