<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunil Music World</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:black;
    color:white;
    overflow-x:hidden;
}

/* HEADER */

header{
    width:100%;
    padding:20px;
    background:rgba(255,0,0,0.4);
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:fixed;
    top:0;
    z-index:1000;
    backdrop-filter:blur(10px);
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:gold;
    text-shadow:0 0 15px red;
}

nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
    font-weight:bold;
}

/* HERO */

.hero{
    height:100vh;
    background:url('bg.png') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
}

.hero h1{
    font-size:70px;
    color:gold;
    text-shadow:0 0 20px red;
}

.hero p{
    margin-top:20px;
    font-size:22px;
}

.btn{
    margin-top:25px;
    padding:15px 35px;
    border:none;
    background:red;
    color:white;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 20px red;
}

/* SECTION */

.section{
    padding:80px 20px;
    text-align:center;
}

.section h2{
    font-size:45px;
    margin-bottom:30px;
    color:cyan;
}

/* SONG BOX */

.song-box{
    background:#111;
    margin:20px auto;
    padding:20px;
    border-radius:20px;
    max-width:600px;
    box-shadow:0 0 20px rgba(255,0,0,0.5);
}

.song-box h3{
    margin-bottom:15px;
    color:gold;
}

audio{
    width:100%;
}

/* GALLERY */

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,0,0,0.5);
}

/* VIDEO */

iframe{
    max-width:100%;
    border-radius:20px;
    box-shadow:0 0 20px red;
}

/* FOOTER */

footer{
    text-align:center;
    padding:20px;
    background:#111;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
    font-size:40px;
}

nav{
    font-size:12px;
}

iframe{
    width:100%;
    height:250px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">🎵 Sunil Music World</div>

<nav>
<a href="#">Home</a>
<a href="#">Songs</a>
<a href="#">Gallery</a>
<a href="#">Videos</a>
<a href="#">Contact</a>
</nav>

</header>

<!-- HERO -->

<section class="hero">

<h1>🎶 Sunil Music World 🎶</h1>

<p>Welcome To My Professional Music Website</p>

<button class="btn">Listen Now</button>

</section>

<!-- SONG SECTION -->

<section class="section">

<h2>My Songs</h2>

<div class="song-box">

<h3>PREMA YESUNU</h3>

<audio controls>
<source src="PREMA%20YESUNI.mp3" type="audio/mpeg">
Your browser does not support audio.
</audio>

</div>

</section>

<!-- GALLERY -->

<section class="section">

<h2>Gallery</h2>

<div class="gallery">

<img src="bg.png">
<img src="bg.png">
<img src="bg.png">
<img src="bg.png">

</div>

</section>

<!-- VIDEO -->

<section class="section">

<h2>Latest Video</h2>

<iframe width="800" height="450"
src="https://www.youtube.com/embed/m5OQzJFDdm8"
title="YouTube video player"
frameborder="0"
allowfullscreen>
</iframe>

</section>

<!-- FOOTER -->

<footer>

© 2026 Sunil Music World | All Rights Reserved

</footer>

</body>
</html>
