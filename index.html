<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sunil Music World</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    font-family:Arial, sans-serif;
    background:url('bg.png');
    background-size:cover;
    background-attachment:fixed;
    color:white;
}

/* NAVBAR */

nav{
    width:100%;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.6);
    position:fixed;
    top:0;
    z-index:1000;
    backdrop-filter:blur(10px);
}

.logo{
    font-size:35px;
    font-weight:bold;
    color:gold;
    text-shadow:0 0 15px orange;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-size:18px;
    transition:0.3s;
}

nav ul li a:hover{
    color:#00ffff;
}

/* HERO */

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background:rgba(0,0,0,0.5);
}

.hero h1{
    font-size:80px;
    color:#ffcc00;
    text-shadow:0 0 25px red;
}

.hero p{
    margin-top:20px;
    font-size:24px;
}

.hero button{
    margin-top:30px;
    padding:15px 40px;
    border:none;
    border-radius:40px;
    background:red;
    color:white;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 0 20px red;
}

.hero button:hover{
    background:#ff3333;
}

/* SONG SECTION */

.song-section{
    padding:120px 20px;
    text-align:center;
}

.song-section h1{
    font-size:60px;
    color:#00ffff;
    margin-bottom:40px;
    text-shadow:0 0 20px cyan;
}

.song-box{
    width:500px;
    margin:auto;
    padding:30px;
    border-radius:30px;
    background:rgba(0,0,0,0.6);
    box-shadow:0 0 25px red;
}

.song-box h2{
    color:gold;
    margin-bottom:20px;
}

audio{
    width:100%;
}

/* GALLERY */

.gallery{
    padding:100px 20px;
    text-align:center;
}

.gallery h1{
    font-size:60px;
    color:#00ffff;
    margin-bottom:40px;
}

.gallery-images{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.gallery-images img{
    width:300px;
    border-radius:20px;
    box-shadow:0 0 20px red;
    transition:0.3s;
}

.gallery-images img:hover{
    transform:scale(1.05);
}

/* VIDEO */

.video-section{
    padding:100px 20px;
    text-align:center;
}

.video-section h1{
    font-size:60px;
    color:#00ffff;
    margin-bottom:30px;
}

iframe{
    width:80%;
    height:500px;
    border-radius:20px;
    box-shadow:0 0 25px red;
}

/* CONTACT */

.contact{
    padding:100px 20px;
    text-align:center;
}

.contact h1{
    font-size:60px;
    color:#00ffff;
    margin-bottom:30px;
}

.contact input,
.contact textarea{
    width:400px;
    padding:15px;
    margin:10px;
    border:none;
    border-radius:15px;
}

.contact button{
    padding:15px 40px;
    border:none;
    border-radius:30px;
    background:red;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

    .hero h1{
        font-size:45px;
    }

    .song-box{
        width:95%;
    }

    iframe{
        width:95%;
        height:250px;
    }

    .contact input,
    .contact textarea{
        width:95%;
    }

    nav{
        flex-direction:column;
    }

    nav ul{
        margin-top:15px;
    }

}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="logo">
Sunil Music World
</div>

<ul>
<li><a href="#home">Home</a></li>
<li><a href="#songs">Songs</a></li>
<li><a href="#gallery">Gallery</a></li>
<li><a href="#videos">Videos</a></li>
<li><a href="#contact">Contact</a></li>
</ul>

</nav>

<!-- HERO -->

<section class="hero" id="home">

<h1>🎵 Sunil Music World 🎵</h1>

<p>Welcome to my professional music website</p>

<button>Click Me</button>

</section>

<!-- SONGS -->

<section class="song-section" id="songs">

<h1>🎵 My Songs 🎵</h1>

<div class="song-box">

<h2>prema.mp3</h2>

<audio controls>
<source src="prema.mp3" type="audio/mpeg">
</audio>

</div>

</section>

<!-- GALLERY -->

<section class="gallery" id="gallery">

<h1>Gallery</h1>

<div class="gallery-images">

<img src="bg.png">
<img src="bg.png">
<img src="bg.png">

</div>

</section>

<!-- VIDEO -->

<section class="video-section" id="videos">

<h1>Latest Video</h1>

<iframe
src="https://www.youtube.com/embed/m5OQzJFDdm8"
title="YouTube video player"
frameborder="0"
allowfullscreen>
</iframe>

</section>

<!-- CONTACT -->

<section class="contact" id="contact">

<h1>Contact Me</h1>

<input type="text" placeholder="Your Name"><br>

<input type="email" placeholder="Your Email"><br>

<textarea rows="5" placeholder="Message"></textarea><br>

<button>Send Message</button>

</section>

</body>
</html>
